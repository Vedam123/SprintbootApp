# ============================================================
#  APPLICATION PROPERTIES
#  Spring Boot reads this file on startup to configure itself.
#  Without Spring Boot you'd wire all this manually in Java/XML.
# ============================================================

spring.application.name=student-api
server.port=8080

# ---- H2 IN-MEMORY DATABASE --------------------------------
spring.datasource.url=jdbc:h2:mem:studentdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable the H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / HIBERNATE --------------------------------------
# create-drop: Creates tables on startup, drops them on shutdown.
spring.jpa.hibernate.ddl-auto=create-drop

# Print SQL to console so you can see what Hibernate does
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Allow data.sql to run AFTER Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true

# ---- KAFKA ------------------------------------------------
# Address of the Kafka broker.
# Start Kafka locally with Docker: docker run -p 9092:9092 apache/kafka
spring.kafka.bootstrap-servers=localhost:9092

# PRODUCER: serialize StudentEvent → JSON using Jackson
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# CONSUMER: deserialize JSON → StudentEvent using Jackson
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=student-consumer-group

# Tell the deserializer which package the StudentEvent class lives in
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.studentapi.kafka

# earliest = read from the beginning of the topic if no offset exists yet
# (useful so a fresh consumer sees all past messages on first start)
spring.kafka.consumer.auto-offset-reset=earliest
